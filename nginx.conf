server {
    listen 80;
    server_name kgmao.com www.kgmao.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kgmao.com www.kgmao.com;

    # SSL Certificates (Managed by Certbot usually)
    ssl_certificate /etc/letsencrypt/live/kgmao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kgmao.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Frontend - Serve built React application
    location / {
        root /var/www/kgmao/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
    }

    # Backend API - Proxy to PM2 Node.js cluster (default port 5000)
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI Microservice - Proxy to PM2 Python FastAPI (default port 8100)
    location /ai/ {
        proxy_pass http://localhost:8100/ai/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny access to hidden files
    location ~ /\.ht {
        deny all;
    }
}
