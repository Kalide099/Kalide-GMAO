name: KGMAO Production Deployment
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying KGMAO via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.KGMAO_SSH_HOST }}
          username: ${{ secrets.KGMAO_SSH_USER }}
          key: ${{ secrets.KGMAO_SSH_KEY }}
          passphrase: ${{ secrets.KGMAO_SSH_PASSPHRASE }}
          port: ${{ secrets.KGMAO_SSH_PORT }}
          command_timeout: 30m
          script: |
            export PATH=/opt/alt/alt-nodejs20/root/usr/bin:$PATH
            cd "${{ secrets.KGMAO_DEPLOY_PATH }}"
            echo "Current Path: $(pwd)"
            echo "Pulling latest code..."
            git remote set-url origin "https://x-access-token:${{ secrets.KGMAO_GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git fetch origin main
            git reset --hard origin/main

            echo "Installing root dependencies..."
            npm install --omit=dev

            echo "Installing backend production dependencies..."
            npm --prefix backend install --omit=dev

            echo "Installing frontend dependencies & building Vite..."
            npm --prefix frontend install --include=dev
            npm --prefix frontend run build

            echo "Verifying production quality gate..."
            npm run quality:backend
            node backend/src/scripts/verify-migrations.js

            echo "Restarting Node.js PM2 process..."
            npx pm2 reload ecosystem.config.js --update-env
            npx pm2 status
            npx pm2 logs kgmao-backend --lines 100 --nostream
            echo "Deployment completed successfully!"
