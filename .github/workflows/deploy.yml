name: KGMAO Production Deployment
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying KGMAO via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/u633695266/domains/kgmao.com/public_html/.builds/last-source
            echo "Pulling latest code..."
            git pull origin main

            echo "Installing backend dependencies..."
            npm install

            echo "Installing frontend dependencies & building Vite..."
            cd frontend
            npm install
            npm run build
            cd ..

            echo "Restarting Node.js PM2 process seamlessly..."
            npx pm2 reload ecosystem.config.js --update-env

            echo "Deployment completed successfully!"
