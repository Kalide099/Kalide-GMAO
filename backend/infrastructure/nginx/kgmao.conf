# KGMAO Full Nginx Reverse Proxy Config (/etc/nginx/sites-available/kgmao.com)

server {
    listen 80;
    server_name kgmao.com www.kgmao.com;

    # SSL Redirection block placeholder (Uncomment after running Certbot)
    # return 301 https://$host$request_uri;

    # Backend API Routing (Node.js)
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Enhanced security and real-ip forwarding
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend Static Built Assets (Vite)
    location / {
        root /var/www/kgmao/frontend/dist;
        index index.html index.htm;
        
        # SPA Routing resolution (Always fallback to index.html for React Router to handle)
        try_files $uri $uri/ /index.html;
    }

    # Gzip Compression Optimization for Performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";
}
